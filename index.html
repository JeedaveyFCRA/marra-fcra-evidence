<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Violation Tagger v6.2 – Fully Integrated</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    #left-panel {
      width: 400px;
      padding: 15px;
      background-color: #f7f9fc;
      border-right: 1px solid #ccc;
      overflow-y: auto;
    }
    #right-panel {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #image-container {
      position: relative;
      width: 810px;
      height: 920px;
      border: 1px solid #ccc;
      background: white;
      border-radius: 12px;
      cursor: crosshair;
      overflow: hidden;
      margin-top: 10px;
    }
    #report-img {
      position: absolute;
      width: 778px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .draw-box {
      position: absolute;
      border: 2px dashed red;
      background-color: rgba(255,0,0,0.1);
      border-radius: 4px;
    }
    .draw-box.selected {
      border: 2px solid blue;
      background-color: rgba(0,0,255,0.1);
    }
    .resize-handle {
      position: absolute;
      width: 6px; height: 6px;
      background: white;
      border: 1px solid #333;
      border-radius: 50%;
    }
    .top-left {top:-3px;left:-3px;cursor:nwse-resize;}
    .top-right {top:-3px;right:-3px;cursor:nesw-resize;}
    .bottom-left {bottom:-3px;left:-3px;cursor:nesw-resize;}
    .bottom-right {bottom:-3px;right:-3px;cursor:nwse-resize;}
    #popup {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      display: none;
      width: 260px;
      z-index: 20;
    }
    #sidebar-hints {
      font-size: 12px;
      line-height: 1.3;
      padding: 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .hint-box {
      padding: 4px 8px;
      margin-bottom: 4px;
      border-left: 3px solid #007bff;
      background: #f9f9f9;
      border-radius: 3px;
    }
    .hint-box.severe {border-left:3px solid #d9534f;background:#fff5f5;}
    .hint-box.serious {border-left:3px solid #f0ad4e;background:#fffaf0;}
    .hint-box.minor {border-left:3px solid #f7e360;background:#fefef7;}
    .hint-label {font-weight:bold;}
    .hint-codes {font-size:11px;color:#666;}
    #tag-log {margin-top:10px;}
    .tag-entry {
      padding:6px;
      background:#f8f9fa;
      border-radius:4px;
      font-size:12px;
      margin-bottom:6px;
    }
    .tag-position {font-size:11px;color:#999;}
    .control-panel {
      margin-bottom:20px;
      display:flex; gap:6px;
      flex-wrap:wrap;
    }
    button {
      padding:4px 8px;
      font-size:13px;
      cursor:pointer;
    }
    .file-input-button {
      padding:4px 8px;
      cursor:pointer;
      background:#f0f0f0;
      border:1px solid #ccc;
      border-radius:3px;
    }
    .status-message {
      font-size:12px;
      padding:5px 10px;
      background:#e8f4ff;
      border-radius:4px;
      margin-top:5px;
      display:none;
    }
    #selector-panel {
      width:400px;
      padding:15px;
      background-color:#fefefe;
      border-left:1px solid #ccc;
      overflow-y:auto;
    }
    #main-controls {
      display:flex;
      flex-direction:column;
      margin-bottom:20px;
    }
    #image-viewer {display:flex;flex:1;}
  </style>
</head>

<body>
<div id="left-panel">
  <div id="sidebar-hints">Upload image to see violations.</div>
  <div id="tag-log"></div>
</div>

<div id="right-panel">
  <div id="main-controls">
    <div class="control-panel">
      <label for="loadImage" class="file-input-button">📁 Load Image</label>
      <input type="file" id="loadImage" accept="image/*" style="display:none"/>
      <button id="exportCSV">📤 Export CSV</button>
      <button id="toggleMultiSelect">🔘 Multi: OFF</button>
      <button id="deleteSelected">🗑️ Delete Selected</button>
      <button id="clearImageData">🧹 Clear Image Data</button>
      <button id="saveProgress">💾 Save Progress</button>
      <button id="syncToAirtable">📡 Sync to Airtable</button>
    </div>
    <div id="status-message" class="status-message"></div>
  </div>

  <div id="image-viewer">
    <div id="image-container">
      <img id="report-img" src="" alt="Uploaded image appears here"/>
    </div>

    <div id="selector-panel">
      <h3 style="font-size:14px;">🗂️ Select Credit Report Page</h3>
      <label>Bureau:
        <select id="bureauSelect" onchange="updateCreditorOptions()" style="width:100%;">
          <option disabled selected>Select Bureau</option>
          <option value="Equifax">Equifax</option>
          <option value="Experian">Experian</option>
          <option value="TransUnion">TransUnion</option>
        </select>
      </label><br><br>
      <label>Creditor:
        <select id="creditorSelect" onchange="updateDateOptions()" style="width:100%;" disabled>
          <option disabled selected>Select Creditor</option>
        </select>
      </label><br><br>
      <label>Date + Page:
        <select id="dateSelect" style="width:100%;" disabled>
          <option disabled selected>Select Date + Page</option>
        </select>
      </label><br><br>
    </div>
  </div>

  <div id="popup">
    <label><strong>Select Violation:</strong><br/>
      <select id="violationPreset" style="width:100%;padding:4px;"></select>
    </label><br/><br/>
    <button id="saveTag">✅ Save Tag</button>
    <button id="cancelTag">❌ Cancel</button>
  </div>
</div>


// End of Part 1







<script>
// Violation hints by bureau
const hintLookup = {
  "EQ": [
    {label: "Account Status: INCLUDED_IN_CHAPTER_13", covers:["§1681c(f)", "§1681e(b)"], action:"Account misreported as active in Chapter 13 after discharge", severity:"🔴"},
    {label: "Reported Balance: $0", covers:["§1681e(b)", "§1681c(f)"], action:"Zero balance misreported with discharge context", severity:"🔴"},
    {label: "Available Credit", covers:["§1681e(b)"], action:"Available credit field inaccurate or blank", severity:"🟠"},
    {label: "High Credit", covers:["§1681e(b)"], action:"High credit not accurately reflected", severity:"🟠"},
    {label: "Credit Limit", covers:["§1681e(b)"], action:"Missing or inaccurate limit field", severity:"🟠"}
  ],
  "TU": [
    {label: "Date Updated: 02/19/2024", covers:["§1681s-2(a)(1)(A)", "§1681e(b)"], action:"Date updated but data still inaccurate", severity:"🔴"},
    {label: "Pay Status: >Included in Bankruptcy<", covers:["§1681c(f)", "§1681e(b)"], action:"Misleading status post-discharge", severity:"🔴"}
  ],
  "EX": [
    {label: "Status: Discharged through Chapter 13", covers:["§1681s-2(a)(1)(A)","§1681c(a)(4)","§1681e(b)"], action:"Fails to reflect discharge update", severity:"🔴"},
    {label: "Status Updated: Oct 2018", covers:["§1681c(a)(4)","§1681s-2(a)(1)(A)"], action:"Stale status update field", severity:"🔴"}
  ]
};

// Debugging config
const debug = {
  imageLoading: true,
  log: function(msg){if(this.imageLoading)console.log('[DEBUG]',msg);}
};

// Global variables
let currentBox=null, selectedBox=null, drawing=false, resizing=false, imageName='', tagData=[], currentHints=[], dragStartX=0, dragStartY=0, resizeHandle=null, originalBox={x:0,y:0,width:0,height:0}, allImageData={}, isMultiSelectMode=false;

// DOM elements
const imageContainer=document.getElementById('image-container'), image=document.getElementById('report-img'), popup=document.getElementById('popup'), presetDropdown=document.getElementById('violationPreset'), saveButton=document.getElementById('saveTag'), cancelButton=document.getElementById('cancelTag'), deleteButton=document.getElementById('deleteSelected'), toggleMultiSelectBtn=document.getElementById('toggleMultiSelect'), saveProgressButton=document.getElementById('saveProgress'), sidebarHints=document.getElementById('sidebar-hints'), tagLog=document.getElementById('tag-log'), statusMessage=document.getElementById('status-message'), fileInput=document.getElementById('loadImage'), bureauSelect=document.getElementById('bureauSelect'), creditorSelect=document.getElementById('creditorSelect'), dateSelect=document.getElementById('dateSelect');

// Initialize application
function init(){
  debug.log('Initializing Violation Tagger...');
  loadAllProgress();
  setupEventListeners();
  showStatusMessage('✅ Violation Tagger ready!',2000);
  setTimeout(()=>{image.onerror=()=>{showStatusMessage('⚠️ Failed to load image',5000);}},1000);
}

// Setup event listeners
function setupEventListeners(){
  fileInput.addEventListener('change',handleImageUpload);
  document.getElementById('exportCSV').addEventListener('click',exportToCSV);
  deleteButton.addEventListener('click',deleteSelectedBoxes);
  toggleMultiSelectBtn.addEventListener('click',toggleMultiSelectMode);
  saveProgressButton.addEventListener('click',saveProgress);
  document.getElementById('clearImageData').addEventListener('click',clearImageData);
  saveButton.addEventListener('click',saveTag);
  cancelButton.addEventListener('click',cancelTag);
  document.getElementById('syncToAirtable').addEventListener('click',sendToAirtable);
  imageContainer.addEventListener('mousedown',startDrawingOrSelecting);
  imageContainer.addEventListener('mousemove',handleMouseMove);
  imageContainer.addEventListener('mouseup',endAction);
  document.addEventListener('mousemove',resizeBox);
}

// Image Upload Handling
function handleImageUpload(e){
  const file=e.target.files[0];
  if(!file||!file.type.match('image.*')){
    showStatusMessage('⚠️ Invalid file selected',5000);
    return;
  }
  if(imageName)saveTagsForCurrentImage();
  clearAllBoxes();tagData=[];currentHints=[];updateTagLog();sidebarHints.innerHTML='Loading hints...';
  imageName=file.name;const reader=new FileReader();
  reader.onload=e=>{image.src=e.target.result;showStatusMessage('🖼️ Rendering image...',0);};
  reader.onerror=()=>showStatusMessage('⚠️ Error reading file',5000);
  reader.readAsDataURL(file);
  image.onload=()=>{clearAllBoxes();tagData=[];loadHintsForImage();initViolationDropdown();clearSelection();loadTagsForCurrentImage();showStatusMessage(`✅ Image loaded: ${imageName}`);};
}

// Load hints based on image filename
function loadHintsForImage(){
  const upperName=imageName.toUpperCase();
  let bureauCode='';
  if(upperName.includes('-EQ-'))bureauCode='EQ';
  else if(upperName.includes('-EX-'))bureauCode='EX';
  else if(upperName.includes('-TU-'))bureauCode='TU';
  currentHints=bureauCode?[...hintLookup[bureauCode]]:[];
  updateHintsPanel();
}

// Update hints display
function updateHintsPanel(){
  sidebarHints.innerHTML=currentHints.length?currentHints.map(h=>{
    const severity=h.severity==="🔴"?"severe":h.severity==="🟠"?"serious":"minor";
    return `<div class="hint-box ${severity}"><div class="hint-label">${h.label}</div><div class="hint-action">${h.action}</div><div class="hint-codes">${h.covers.join(', ')}</div></div>`;
  }).join(''):'<div style="color:#666;">No violations detected.</div>';
}

// Initialize violation dropdown
function initViolationDropdown(){
  presetDropdown.innerHTML='<option disabled selected>Select violation</option>';
  currentHints.forEach((h,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${h.severity} ${h.label}`;presetDropdown.appendChild(o);});
}

// Save/load tags
function saveTagsForCurrentImage(){if(imageName){allImageData[imageName]=[...tagData];saveAllProgress();}}
function loadTagsForCurrentImage(){loadAllProgress();tagData=[];clearAllBoxes();if(allImageData[imageName]){tagData=[...allImageData[imageName]];renderSavedTags();}updateTagLog();}
function renderSavedTags(){tagData.forEach((t,i)=>{const b=document.createElement('div');b.className='draw-box';b.style.left=`${t.x}px`;b.style.top=`${t.y}px`;b.style.width=`${t.width}px`;b.style.height=`${t.height}px`;b.title=`${t.label}\n${t.codes.join(', ')}`;b.dataset.index=i;imageContainer.appendChild(b);});}

// Local storage handling
function saveAllProgress(){localStorage.setItem('violationTagsAll',JSON.stringify(allImageData));}
function loadAllProgress(){allImageData=JSON.parse(localStorage.getItem('violationTagsAll'))||{};}

// Status message
function showStatusMessage(msg,dur=3000){statusMessage.textContent=msg;statusMessage.style.display='block';setTimeout(()=>statusMessage.style.display='none',dur);}

// Multi-select toggle
function toggleMultiSelectMode(){isMultiSelectMode=!isMultiSelectMode;toggleMultiSelectBtn.textContent=`🔘 Multi: ${isMultiSelectMode?'ON':'OFF'}`;showStatusMessage(`Multi-select: ${isMultiSelectMode?'ON':'OFF'}`);}

// Dropdown selectors logic
const imageMap={"Equifax":{"AL":["2024-04-25-P57"],"BB":["2024-04-25-P20"]},"Experian":{"AL":["2024-04-25-P05"]},"TransUnion":{"AL":["2024-04-25-P07"]}};
function updateCreditorOptions(){
  creditorSelect.innerHTML='<option disabled selected>Select Creditor</option>';dateSelect.disabled=true;dateSelect.innerHTML='';const b=bureauSelect.value;if(imageMap[b]){Object.keys(imageMap[b]).forEach(c=>{creditorSelect.innerHTML+=`<option>${c}</option>`;});creditorSelect.disabled=false;}
}
function updateDateOptions(){
  const b=bureauSelect.value,c=creditorSelect.value;dateSelect.innerHTML='<option disabled selected>Select Date + Page</option>';if(imageMap[b][c]){imageMap[b][c].forEach(d=>{dateSelect.innerHTML+=`<option>${d}.png</option>`;});dateSelect.disabled=false;}
}

// End of Part 2





// Load image from GitHub/Airtable based on dropdown selection
async function loadSelectedImage() {
  const bureau = bureauSelect.value;
  const selectedFilename = dateSelect.value;

  if (!bureau || !selectedFilename) {
    showStatusMessage('⚠️ Select all dropdown fields', 4000);
    return;
  }

  const imageUrl = `https://YOUR_GITHUB_BASE_URL/${bureau}/${selectedFilename}`;
  imageName = selectedFilename;

  try {
    showStatusMessage('⏳ Loading image...', 0);
    const response = await fetch(imageUrl);
    if (!response.ok) throw new Error(`Failed to load: ${response.statusText}`);
    const blob = await response.blob();
    const reader = new FileReader();

    reader.onload = function(event) {
      clearAllBoxes(); tagData=[]; currentHints=[]; updateTagLog(); sidebarHints.innerHTML='Loading hints...';
      image.src = event.target.result;
      showStatusMessage(`✅ Loaded: ${selectedFilename}`);
    };
    reader.onerror = () => showStatusMessage('⚠️ Error reading fetched image file', 5000);
    reader.readAsDataURL(blob);

    image.onload = () => {
      loadHintsForImage();
      initViolationDropdown();
      clearSelection();
      loadTagsForCurrentImage();
    };

    image.onerror = () => showStatusMessage('⚠️ Error displaying image', 5000);
  } catch (error) {
    console.error(error);
    showStatusMessage(`⚠️ ${error.message}`, 5000);
  }
}

// Assign image loading logic to existing Load Image button
document.querySelector('label[for="loadImage"]').onclick = () => {
  if (bureauSelect.value && creditorSelect.value && dateSelect.value) {
    loadSelectedImage();
    return false;
  }
};

// Drawing and box interaction handlers
function startDrawingOrSelecting(e) {
  if (e.target.classList.contains('resize-handle')) {
    startResizing(e);
    return;
  }
  if (e.target.classList.contains('draw-box')) {
    selectBox(e.target, e.shiftKey || isMultiSelectMode);
    startMoving(e);
    return;
  }
  startDrawing(e);
}

function startDrawing(e) {
  drawing = true;
  const rect = imageContainer.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  currentBox = document.createElement('div');
  currentBox.className = 'draw-box';
  currentBox.style.left = `${x}px`; currentBox.style.top = `${y}px`;
  currentBox.style.width = '0px'; currentBox.style.height = '0px';
  currentBox.dataset.index = tagData.length;
  imageContainer.appendChild(currentBox);
}

function handleMouseMove(e) {
  if (drawing && currentBox) {
    const rect = imageContainer.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const startX = parseInt(currentBox.style.left), startY = parseInt(currentBox.style.top);
    currentBox.style.left = `${Math.min(x,startX)}px`; currentBox.style.top = `${Math.min(y,startY)}px`;
    currentBox.style.width = `${Math.abs(x-startX)}px`; currentBox.style.height = `${Math.abs(y-startY)}px`;
  }
}

function endAction(e) {
  if (drawing && currentBox) {
    const w = parseInt(currentBox.style.width), h = parseInt(currentBox.style.height);
    if (w<10 || h<10) currentBox.remove();
    else {
      popup.style.left=`${e.pageX+10}px`;popup.style.top=`${e.pageY+10}px`;popup.style.display='block';
    }
    drawing=false;
  }
  resizing=false;
}

// Resize logic
function startResizing(e) {
  resizing=true;resizeHandle=e.target;selectedBox=e.target.parentNode;
  originalBox={x:parseInt(selectedBox.style.left),y:parseInt(selectedBox.style.top),width:parseInt(selectedBox.style.width),height:parseInt(selectedBox.style.height)};
  dragStartX=e.clientX;dragStartY=e.clientY;
}

function resizeBox(e) {
  if(!resizing)return;
  const dx=e.clientX-dragStartX, dy=e.clientY-dragStartY, handle=resizeHandle.classList[1];
  let{x,y,width,height}=originalBox;
  if(handle.includes('right'))width=Math.max(10,width+dx);
  if(handle.includes('bottom'))height=Math.max(10,height+dy);
  if(handle.includes('left')){x+=dx;width-=dx;}
  if(handle.includes('top')){y+=dy;height-=dy;}
  selectedBox.style.left=`${x}px`;selectedBox.style.top=`${y}px`;selectedBox.style.width=`${width}px`;selectedBox.style.height=`${height}px`;
  updateTagPosition(selectedBox);updateTagData(selectedBox);
}

// Select/move boxes
function selectBox(box,multi){if(!multi)clearSelection();box.classList.add('selected');addResizeHandles(box);selectedBox=box;}
function clearSelection(){document.querySelectorAll('.draw-box').forEach(b=>{b.classList.remove('selected');b.querySelectorAll('.resize-handle').forEach(h=>h.remove());});selectedBox=null;}
function addResizeHandles(box){['top-left','top-right','bottom-left','bottom-right'].forEach(pos=>{const h=document.createElement('div');h.className=`resize-handle ${pos}`;box.appendChild(h);});}

function startMoving(e){dragStartX=e.clientX-parseInt(selectedBox.style.left);dragStartY=e.clientY-parseInt(selectedBox.style.top);document.addEventListener('mousemove',moveBox);document.addEventListener('mouseup',stopMoving);}
function moveBox(e){const rect=imageContainer.getBoundingClientRect();let x=e.clientX-dragStartX,y=e.clientY-dragStartY;x=Math.max(0,Math.min(rect.width-selectedBox.offsetWidth,x));y=Math.max(0,Math.min(rect.height-selectedBox.offsetHeight,y));selectedBox.style.left=`${x}px`;selectedBox.style.top=`${y}px`;updateTagPosition(selectedBox);updateTagData(selectedBox);}
function stopMoving(){document.removeEventListener('mousemove',moveBox);document.removeEventListener('mouseup',stopMoving);}

function updateTagPosition(box){
  const i=parseInt(box.dataset.index);if(isNaN(i))return;
  const x=parseInt(box.style.left),y=parseInt(box.style.top),w=parseInt(box.style.width),h=parseInt(box.style.height);
  const entry=document.querySelector(`#tag-log .tag-entry:nth-child(${i+1})`);
  if(entry)entry.querySelector('.tag-position').textContent=`(${x}, ${y}) | ${w}×${h}`;
}

function updateTagData(box){
  const i=parseInt(box.dataset.index);if(isNaN(i))return;
  Object.assign(tagData[i],{x:parseInt(box.style.left),y:parseInt(box.style.top),width:parseInt(box.style.width),height:parseInt(box.style.height)});
  if(imageName){allImageData[imageName]=[...tagData];saveAllProgress();}
}

// Tag save/cancel handlers
function saveTag(){
  const idx=presetDropdown.value;if(!currentBox||idx==='')return;
  const hint=currentHints[idx];
  currentBox.title=`${hint.label}\n${hint.covers.join(', ')}`;currentBox.classList.add('selected');
  tagData.push({label:hint.label,codes:hint.covers,severity:hint.severity||"🟡",x:parseInt(currentBox.style.left),y:parseInt(currentBox.style.top),width:parseInt(currentBox.style.width),height:parseInt(currentBox.style.height)});
  currentBox.dataset.index=tagData.length-1;updateTagLog();allImageData[imageName]=[...tagData];saveAllProgress();popup.style.display='none';currentBox=null;showStatusMessage('✅ Violation tag added');
}

function cancelTag(){if(currentBox)currentBox.remove();popup.style.display='none';}

// Update tag log
function updateTagLog(){
  tagLog.innerHTML='';tagData.forEach(t=>{tagLog.innerHTML+=`<div class="tag-entry"><div>${t.severity}<strong>${t.label}</strong></div><div>${t.codes.join(', ')}</div><div class="tag-position">(${t.x}, ${t.y}) | ${t.width}×${t.height})</div></div>`;});
}

// End of Part 3





// Export data to CSV
function exportToCSV(){
  if(imageName)saveTagsForCurrentImage();
  if(!Object.keys(allImageData).length){showStatusMessage('⚠️ No data to export',4000);return;}
  let csv='Image,Severity,Label,Codes,X,Y,Width,Height\n';
  for(const[img,tags]of Object.entries(allImageData)){
    tags.forEach(t=>csv+=`"${img}","${t.severity}","${t.label}",${t.codes.join(';')},${t.x},${t.y},${t.width},${t.height}\n`);
  }
  const blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='violations.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);
  showStatusMessage('✅ CSV exported');
}

// Sync to Airtable
const AIRTABLE_TOKEN='YOUR_AIRTABLE_API_TOKEN';
const AIRTABLE_BASE_ID='YOUR_AIRTABLE_BASE_ID';
const AIRTABLE_TABLE_NAME='ExportedViolations';

async function sendToAirtable(){
  if(!Object.keys(allImageData).length){alert("No violation tags to sync.");return;}
  let totalSent=0;
  for(const[imgName,tags]of Object.entries(allImageData)){
    for(const tag of tags){
      const record={fields:{"Image":imgName,"Severity":tag.severity||"🟡","Label":tag.label||"","Codes":(tag.codes||[]).join(';'),"X":tag.x,"Y":tag.y,"Width":tag.width,"Height":tag.height}};
      try{
        const res=await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${AIRTABLE_TABLE_NAME}`,{
          method:"POST",headers:{Authorization:`Bearer ${AIRTABLE_TOKEN}`,"Content-Type":"application/json"},body:JSON.stringify(record)});
        if(!res.ok)throw new Error(`Airtable error: ${res.statusText}`);totalSent++;
      }catch(err){console.error(err);alert(`❌ Error syncing records.`);return;}
    }
  }
  alert(`✅ Sent ${totalSent} violations.`);
}

// Delete selected boxes
function deleteSelectedBoxes(){
  const boxes=document.querySelectorAll('.draw-box.selected');
  if(!boxes.length){showStatusMessage('⚠️ No boxes selected',4000);return;}
  boxes.forEach(box=>{
    tagData.splice(parseInt(box.dataset.index),1);box.remove();
  });
  document.querySelectorAll('.draw-box').forEach((b,i)=>{b.dataset.index=i;});
  updateTagLog();if(imageName){allImageData[imageName]=[...tagData];saveAllProgress();}
  showStatusMessage(`✅ Deleted ${boxes.length} violation(s)`);
}

// Clear image data
function clearImageData(){
  if(!imageName){showStatusMessage('⚠️ No image loaded',4000);return;}
  clearAllBoxes();delete allImageData[imageName];saveAllProgress();tagData=[];currentHints=[];updateTagLog();sidebarHints.innerHTML='Upload image to see violations.';showStatusMessage(`✅ Cleared data for ${imageName}`);
}

// Clear boxes helper
