// Debug configuration
const debug = {
  imageLoading: true,
  log: function(message) {
    if (this.imageLoading) console.log('[DEBUG]', message);
  }
};

// Global variables
let currentBox = null;
let selectedBox = null;
let drawing = false;
let resizing = false;
let imageName = '';
let tagData = [];
let currentHints = [];
let dragStartX = 0;
let dragStartY = 0;
let resizeHandle = null;
let originalBox = { x: 0, y: 0, width: 0, height: 0 };
let allImageData = {};
let isMultiSelectMode = false;

// DOM elements
const imageContainer = document.getElementById('image-container');
const image = document.getElementById('report-img');
const popup = document.getElementById('popup');
const presetDropdown = document.getElementById('violationPreset');

// Initialize the application
function init() {
  debug.log('Initializing application...');
  loadAllProgress();
  setupEventListeners();
  showStatusMessage('✅ Violation Tagger ready!', 2000);
  
  // Only set error handler after initial load

    image.onerror = function() {

<script>
// Toggle multi-select mode
function toggleMultiSelectMode() {
  isMultiSelectMode = !isMultiSelectMode;
  toggleMultiSelectBtn.textContent = `🔘 Multi: ${isMultiSelectMode ? 'ON' : 'OFF'}`;
  showStatusMessage(`Multi-select mode: ${isMultiSelectMode ? 'ON' : 'OFF'}`);
}

// Handle image upload with enhanced error handling
function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) {
    debug.log('No file selected');
    return;
  }

  debug.log(`File selected: ${file.name}, type: ${file.type}, size: ${file.size} bytes`);

  // Validate image type
  if (!file.type.match('image.*')) {
    debug.log('Invalid file type selected');
    showStatusMessage('⚠️ Please select an image file (PNG, JPEG, GIF)', 5000);
    return;
  }

  // Save current data before loading new image
  if (imageName) {
    saveTagsForCurrentImage();
  }
  
  // Clear all existing violation boxes and reset state
  clearAllBoxes();
  tagData = [];
  currentHints = [];
  updateTagLog();
  sidebarHints.innerHTML = 'Upload image to see violations.';
  
  // Set new image name
  imageName = file.name;
  debug.log(`Loading new image: ${imageName}`);

  const reader = new FileReader();
  
  reader.onloadstart = () => {
    debug.log('Starting file read...');
    showStatusMessage('⏳ Loading image...', 0);
  };
  
  reader.onload = function(event) {
    debug.log('FileReader load event triggered');
    image.src = event.target.result;
    showStatusMessage('🖼️ Rendering image...', 0);
  };
  
  reader.onerror = function() {
    debug.log('FileReader error occurred');
    showStatusMessage('⚠️ Error reading image file', 5000);
  };
  
  reader.onloadend = function() {
    debug.log('FileReader load completed');
  };

  image.onload = function() {
    debug.log('Image onload event triggered');
    
    // Full cleanup before loading new content
    clearAllBoxes();
    tagData = [];
    
    loadHintsForImage();
    initViolationDropdown();
    clearSelection();
    loadTagsForCurrentImage();
    
    showStatusMessage(`✅ Image loaded: ${imageName}`);
    debug.log(`Image dimensions: ${image.naturalWidth}x${image.naturalHeight}`);
    debug.log(`Rendered dimensions: ${image.width}x${image.height}`);
  };

  reader.readAsDataURL(file);
}

// Load hints based on image name with improved bureau detection
function loadHintsForImage() {
  if (!imageName) {
    debug.log('No image name available for hint loading');
    currentHints = [];
    return;
  }

  // Case-insensitive bureau detection
  const upperName = imageName.toUpperCase();
  let bureauCode = '';
  
  if (upperName.includes('-EQ-')) bureauCode = 'EQ';
  else if (upperName.includes('-EX-')) bureauCode = 'EX';
  else if (upperName.includes('-TU-')) bureauCode = 'TU';
  else if (upperName.includes('EQUIFAX')) bureauCode = 'EQ';
  else if (upperName.includes('EXPERIAN')) bureauCode = 'EX';
  else if (upperName.includes('TRANSUNION')) bureauCode = 'TU';

  debug.log(`Detected bureau code: ${bureauCode || 'None'} from filename: ${imageName}`);
  currentHints = bureauCode ? [...hintLookup[bureauCode]] : [];
  updateHintsPanel();
}

// Update hints panel display
function updateHintsPanel() {
  debug.log(`Updating hints panel with ${currentHints.length} hints`);
  
  if (currentHints.length === 0) {
    sidebarHints.innerHTML = '<div style="color:#666;">No specific violations detected for this bureau.</div>';
    return;
  }

  sidebarHints.innerHTML = currentHints.map(hint => {
    const severityClass = hint.severity === "🔴" ? "severe" :
                         hint.severity === "🟠" ? "serious" : "minor";

    return `
      <div class="hint-box ${severityClass}">
        <div class="hint-label">${hint.label}</div>
        <div class="hint-action">${hint.action}</div>
        <div class="hint-codes">${hint.covers.join(', ')}</div>
      </div>
    `;
  }).join('');
}

// Initialize violation dropdown
function initViolationDropdown() {
  debug.log(`Initializing violation dropdown with ${currentHints.length} options`);
  presetDropdown.innerHTML = '<option disabled selected>Select a violation</option>';
  currentHints.forEach((hint, index) => {
    const option = document.createElement('option');
    option.value = index;
    option.textContent = `${hint.severity || '🟡'} ${hint.label} (${hint.covers.length} codes)`;
    presetDropdown.appendChild(option);
  });
}
</script>







<script>
// Save tags for current image
function saveTagsForCurrentImage() {
  if (!imageName) {
    debug.log('No image name to save tags for');
    return;
  }
  debug.log(`Saving tags for image: ${imageName}`);
  allImageData[imageName] = [...tagData];
  saveAllProgress();
}

// Load tags for current image
function loadTagsForCurrentImage() {
  debug.log(`Loading tags for image: ${imageName}`);
  loadAllProgress();
  
  // Clear existing data first
  tagData = [];
  clearAllBoxes();
  
  if (allImageData[imageName]) {
    debug.log(`Found ${allImageData[imageName].length} saved tags for this image`);
    tagData = [...allImageData[imageName]];
    renderSavedTags();
  } else {
    debug.log('No saved tags found for this image');
  }
  
  updateTagLog();
}

// Render saved tags on the image
function renderSavedTags() {
  debug.log(`Rendering ${tagData.length} saved tags`);
  document.querySelectorAll('.draw-box').forEach(box => box.remove());
  
  tagData.forEach((tag, index) => {
    const box = document.createElement('div');
    box.className = 'draw-box';
    box.style.left = `${tag.x}px`;
    box.style.top = `${tag.y}px`;
    box.style.width = `${tag.width}px`;
    box.style.height = `${tag.height}px`;
    box.title = `${tag.label}\n${tag.codes.join(', ')}`;
    box.dataset.index = index;
    imageContainer.appendChild(box);
  });
}

// Drawing and selection functions with enhanced position tracking
function startDrawingOrSelecting(e) {
  debug.log(`Mouse down event at (${e.clientX}, ${e.clientY})`);
  
  if (e.target.classList.contains('resize-handle')) {
    startResizing(e);
    return;
  }

  if (e.target.classList.contains('draw-box')) {
    selectBox(e.target, e.shiftKey || isMultiSelectMode);
    startMoving(e);
    return;
  }

  startDrawing(e);
}

function startDrawing(e) {
  debug.log(`Starting new box drawing`);
  if (!isMultiSelectMode) clearSelection();
  drawing = true;
  const rect = imageContainer.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  debug.log(`New box starting at (${x}, ${y})`);

  currentBox = document.createElement('div');
  currentBox.className = 'draw-box';
  currentBox.style.left = `${x}px`;
  currentBox.style.top = `${y}px`;
  currentBox.style.width = '0px';
  currentBox.style.height = '0px';
  currentBox.dataset.index = tagData.length;
  imageContainer.appendChild(currentBox);
}

function handleMouseMove(e) {
  if (drawing && currentBox) {
    const rect = imageContainer.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const startX = parseInt(currentBox.style.left);
    const startY = parseInt(currentBox.style.top);
    
    if (x < startX) {
      currentBox.style.left = `${x}px`;
      currentBox.style.width = `${startX - x}px`;
    } else {
      currentBox.style.width = `${x - startX}px`;
    }
    
    if (y < startY) {
      currentBox.style.top = `${y}px`;
      currentBox.style.height = `${startY - y}px`;
    } else {
      currentBox.style.height = `${y - startY}px`;
    }
  }
}

function endAction(e) {
  debug.log(`Mouse up event, drawing: ${drawing}, resizing: ${resizing}`);
  
  if (drawing && currentBox) {
    const w = parseInt(currentBox.style.width);
    const h = parseInt(currentBox.style.height);
    debug.log(`Box dimensions: ${w}x${h}`);

    if (w < 10 || h < 10) {
      debug.log('Box too small - removing');
      currentBox.remove();
    } else {
      debug.log('Showing tag popup');
      popup.style.left = `${e.pageX + 10}px`;
      popup.style.top = `${e.pageY + 10}px`;
      popup.style.display = 'block';
    }
    drawing = false;
  }

  if (resizing) {
    debug.log('Ending resize operation');
    resizing = false;
  }
}

function startResizing(e) {
  debug.log('Starting box resize');
  e.preventDefault();
  e.stopPropagation();
  resizing = true;
  resizeHandle = e.target;
  selectedBox = e.target.parentNode;
  
  originalBox = {
    x: parseInt(selectedBox.style.left) || 0,
    y: parseInt(selectedBox.style.top) || 0,
    width: parseInt(selectedBox.style.width) || 0,
    height: parseInt(selectedBox.style.height) || 0
  };
  
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  
  debug.log(`Resize started - original dimensions: ${originalBox.width}x${originalBox.height}`);
}

function resizeBox(e) {
  if (!resizing || !selectedBox || !resizeHandle) return;

  const containerRect = imageContainer.getBoundingClientRect();
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  const handle = resizeHandle.className.split(' ')[1];
  
  let newLeft = originalBox.x;
  let newTop = originalBox.y;
  let newWidth = originalBox.width;
  let newHeight = originalBox.height;
  
  switch (handle) {
    case 'top-left':
      newLeft = Math.min(originalBox.x + originalBox.width - 20, originalBox.x + dx);
      newTop = Math.min(originalBox.y + originalBox.height - 20, originalBox.y + dy);
      newWidth = originalBox.width - (newLeft - originalBox.x);
      newHeight = originalBox.height - (newTop - originalBox.y);
      break;
    case 'top-right':
      newTop = Math.min(originalBox.y + originalBox.height - 20, originalBox.y + dy);
      newWidth = Math.max(20, originalBox.width + dx);
      newHeight = originalBox.height - (newTop - originalBox.y);
      break;
    case 'bottom-left':
      newLeft = Math.min(originalBox.x + originalBox.width - 20, originalBox.x + dx);
      newWidth = originalBox.width - (newLeft - originalBox.x);
      newHeight = Math.max(20, originalBox.height + dy);
      break;
    case 'bottom-right':
      newWidth = Math.max(20, originalBox.width + dx);
      newHeight = Math.max(20, originalBox.height + dy);
      break;
  }
  
  const maxX = containerRect.width - newWidth;
  const maxY = containerRect.height - newHeight;
  
  newLeft = Math.max(0, Math.min(newLeft, maxX));
  newTop = Math.max(0, Math.min(newTop, maxY));
  
  selectedBox.style.left = `${newLeft}px`;
  selectedBox.style.top = `${newTop}px`;
  selectedBox.style.width = `${newWidth}px`;
  selectedBox.style.height = `${newHeight}px`;
  
  updateTagPosition(selectedBox);
  updateTagData(selectedBox);
}

// Box selection and movement functions
function selectBox(box, multi) {
  debug.log(`Selecting box (multi: ${multi})`);
  if (!multi) clearSelection();
  box.classList.add('selected');
  addResizeHandles(box);
  selectedBox = box;
}

function clearSelection() {
  debug.log('Clearing all selections');
  document.querySelectorAll('.draw-box').forEach(b => {
    b.classList.remove('selected');
    b.querySelectorAll('.resize-handle').forEach(h => h.remove());
  });
  selectedBox = null;
}

function addResizeHandles(box) {
  debug.log('Adding resize handles to box');
  box.querySelectorAll('.resize-handle').forEach(h => h.remove());
  
  ['top-left', 'top-right', 'bottom-left', 'bottom-right'].forEach(pos => {
    const handle = document.createElement('div');
    handle.className = `resize-handle ${pos}`;
    box.appendChild(handle);
  });
}

function startMoving(e) {
  if (!selectedBox) return;
  debug.log('Starting box movement');
  dragStartX = e.clientX - parseInt(selectedBox.style.left);
  dragStartY = e.clientY - parseInt(selectedBox.style.top);
  document.addEventListener('mousemove', moveBox);
  document.addEventListener('mouseup', stopMoving);
}

function moveBox(e) {
  if (!selectedBox) return;
  const rect = imageContainer.getBoundingClientRect();
  let newX = e.clientX - dragStartX;
  let newY = e.clientY - dragStartY;

  newX = Math.max(0, Math.min(newX, rect.width - selectedBox.offsetWidth));
  newY = Math.max(0, Math.min(newY, rect.height - selectedBox.offsetHeight));

  selectedBox.style.left = `${newX}px`;
  selectedBox.style.top = `${newY}px`;

  updateTagPosition(selectedBox);
  updateTagData(selectedBox);
}

function stopMoving() {
  debug.log('Stopping box movement');
  document.removeEventListener('mousemove', moveBox);
  document.removeEventListener('mouseup', stopMoving);
}

function updateTagPosition(box) {
  const idx = parseInt(box.dataset.index);
  if (isNaN(idx)) return;
  
  const x = parseInt(box.style.left);
  const y = parseInt(box.style.top);
  const w = parseInt(box.style.width);
  const h = parseInt(box.style.height);

  const entry = document.querySelector(`#tag-log .tag-entry:nth-child(${idx + 1})`);
  if (entry) {
    entry.querySelector('.tag-position').textContent = `(${x}, ${y}) | ${w}×${h}`;
  }
}

function updateTagData(box) {
  const idx = parseInt(box.dataset.index);
  if (isNaN(idx)) return;
  
  debug.log(`Updating tag data for index ${idx}`);
  tagData[idx].x = parseInt(box.style.left);
  tagData[idx].y = parseInt(box.style.top);
  tagData[idx].width = parseInt(box.style.width);
  tagData[idx].height = parseInt(box.style.height);
  
  if (imageName) {
    allImageData[imageName] = [...tagData];
    saveAllProgress();
  }
}

// Tag creation and management
function saveTag() {
  const idx = presetDropdown.value;
  if (!currentBox || idx === '') {
    debug.log('Save tag attempted with no box or selection');
    return;
  }

  debug.log(`Saving new tag with violation index ${idx}`);
  const hint = currentHints[idx];
  currentBox.title = `${hint.label}\n${hint.covers.join(', ')}`;
  currentBox.classList.add('selected');

  const boxData = {
    label: hint.label,
    codes: hint.covers,
    severity: hint.severity || "🟡",
    x: parseInt(currentBox.style.left),
    y: parseInt(currentBox.style.top),
    width: parseInt(currentBox.style.width),
    height: parseInt(currentBox.style.height)
  };

  tagData.push(boxData);
  currentBox.dataset.index = tagData.length - 1;
  updateTagLog();
  
  if (imageName) {
    allImageData[imageName] = [...tagData];
    saveAllProgress();
  }

  popup.style.display = 'none';
  currentBox = null;
  showStatusMessage('✅ Violation tag added');
}

function updateTagLog() {
  debug.log(`Updating tag log with ${tagData.length} entries`);
  tagLog.innerHTML = '';
  tagData.forEach((tag, index) => {
    const div = document.createElement('div');
    div.className = 'tag-entry';
    const severityIndicator = tag.severity || "🟡";
    div.innerHTML = `
      <div class="tag-label">${severityIndicator} <strong>${tag.label}</strong></div>
      <div class="tag-codes">${tag.codes.join(', ')}</div>
      <div class="tag-position">(${tag.x}, ${tag.y}) | ${tag.width}×${tag.height}</div>
    `;
    tagLog.appendChild(div);
  });
}

function cancelTag() {
  debug.log('Cancelling tag creation');
  if (currentBox) {
    currentBox.remove();
    currentBox = null;
  }
  popup.style.display = 'none';
}

// Data export functions
function exportToCSV() {
  debug.log('Starting CSV export');
  if (imageName) saveTagsForCurrentImage();
  
  if (Object.keys(allImageData).length === 0) {
    debug.log('Export attempted with no data');
    alert('No violations to export!');
    return;
  }

  let csv = 'Image,Severity,Label,Codes,X,Y,Width,Height\n';
  let totalTags = 0;
  
  for (const [img, tags] of Object.entries(allImageData)) {
    if (tags.length === 0) continue;
    totalTags += tags.length;
    
    tags.forEach(t => {
      const severity = t.severity || "🟡";
      csv += `"${img}","${severity}","${t.label}",${t.codes.join(';')},${t.x},${t.y},${t.width},${t.height}\n`;
    });
  }

  debug.log(`Exporting ${totalTags} tags to CSV`);
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8,' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'violations.csv';
  link.click();
  showStatusMessage('✅ CSV file exported');
}

// Save all progress to localStorage
function saveAllProgress() {
  try {
    debug.log('Saving all progress to localStorage');
    localStorage.setItem('violationTagsAll', JSON.stringify(allImageData));
    return true;
  } catch (e) {
    debug.log('Error saving to localStorage:', e);
    console.error('Error saving data:', e);
    showStatusMessage('⚠️ Error saving data', 5000);
    return false;
  }
}

// Load all progress from localStorage
function loadAllProgress() {
  debug.log('Loading progress from localStorage');
  const saved = localStorage.getItem('violationTagsAll');
  if (saved) {
    try {
      allImageData = JSON.parse(saved);
      debug.log(`Loaded data for ${Object.keys(allImageData).length} images`);
      return true;
    } catch (e) {
      debug.log('Error parsing saved data:', e);
      console.error('Error loading saved data:', e);
      showStatusMessage('⚠️ Error loading saved data', 5000);
      allImageData = {};
      return false;
    }
  }
  debug.log('No saved data found in localStorage');
  allImageData = {};
  return false;
}

// Clear data for current image
function clearImageData() {
  if (!imageName) {
    debug.log('Clear attempted with no image loaded');
    showStatusMessage('⚠️ No image loaded');
    return;
  }
  
  debug.log(`Clearing data for image: ${imageName}`);
  
  // Complete cleanup sequence
  clearAllBoxes();
  delete allImageData[imageName];
  saveAllProgress();
  
  tagData = [];
  currentHints = [];
  updateTagLog();
  sidebarHints.innerHTML = 'Upload image to see violations.';
  
  showStatusMessage(`✅ All data for ${imageName} cleared`);
}

// Clear all boxes from UI
function clearAllBoxes() {
  // Remove all draw boxes and their resize handles
  document.querySelectorAll('.draw-box').forEach(box => {
    box.querySelectorAll('.resize-handle').forEach(handle => handle.remove());
    box.remove();
  });
  
  // Clear any pending box creation
  if (currentBox) {
    currentBox.remove();
    currentBox = null;
  }
  
  // Reset drawing state
  drawing = false;
  resizing = false;
  selectedBox = null;
  
  updateTagLog();
}

// Delete selected boxes with enhanced logging
function deleteSelectedBoxes() {
  const selectedBoxes = document.querySelectorAll('.draw-box.selected');
  debug.log(`Delete selected triggered - ${selectedBoxes.length} boxes selected`);
  
  if (selectedBoxes.length === 0) {
    showStatusMessage('⚠️ No boxes selected');
    return;
  }
  
  let indexesToRemove = [];
  
  selectedBoxes.forEach(box => {
    const index = parseInt(box.dataset.index);
    if (!isNaN(index)) {
      indexesToRemove.push(index);
      debug.log(`Marking box ${index} for deletion`);
    }
    box.remove();
  });
  
  // Sort in descending order for safe removal
  indexesToRemove.sort((a, b) => b - a).forEach(index => {
    debug.log(`Removing tag at index ${index}`);
    tagData.splice(index, 1);
  });
  
  // Update remaining box indices
  document.querySelectorAll('.draw-box').forEach((box, idx) => {
    box.dataset.index = idx;
  });
  
  updateTagLog();
  
  if (imageName) {
    debug.log(`Updating saved data after deletion`);
    allImageData[imageName] = [...tagData];
    saveAllProgress();
  }
  
  showStatusMessage(`✅ Deleted ${indexesToRemove.length} violation tag(s)`);
}

// Save progress button handler
function saveProgress() {
  if (imageName) {
    debug.log('Manual save progress triggered');
    saveTagsForCurrentImage();
    showStatusMessage('✅ Progress saved!');
  } else {
    debug.log('Manual save attempted with no image loaded');
    showStatusMessage('⚠️ No image loaded to save!');
  }
}

// UI utility functions
function showStatusMessage(message, duration = 3000) {
  debug.log(`Status message: ${message}`);
  statusMessage.textContent = message;
  statusMessage.style.display = 'block';
  setTimeout(() => {
    statusMessage.style.display = 'none';
  }, duration);
}

const AIRTABLE_TOKEN = 'patiiNzMeWbsIHD29.b5c3d562339758fef9d454a5f7b25aa5702f10a8e0d1506d8682de7ddbf80e77';
const AIRTABLE_BASE_ID = 'apppDRYBhN8W65aL5';
const AIRTABLE_TABLE_NAME = 'ExportedViolations';

async function sendToAirtable() {
  if (!Object.keys(allImageData).length) {
    alert("No violation tags to sync.");
    return;
  }

  let totalSent = 0;

  for (const [imgName, tags] of Object.entries(allImageData)) {
    for (const tag of tags) {
      const record = {
        fields: {
          "Image": imgName,
          "Severity": tag.severity || "🟡",
          "Label": tag.label || "",
          "Codes": (tag.codes || []).join(';'),
          "X": tag.x,
          "Y": tag.y,
          "Width": tag.width,
          "Height": tag.height
        }
      };

      try {
        const res = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${AIRTABLE_TABLE_NAME}`, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${AIRTABLE_TOKEN}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify(record)
        });

        if (!res.ok) throw new Error(`Airtable error: ${res.statusText}`);
        totalSent++;

      } catch (err) {
        console.error("Failed to send to Airtable:", err);
        alert(`❌ Error sending some records. Check console.`);
        return;
      }
    }
  }

  alert(`✅ Successfully sent ${totalSent} violations to Airtable.`);
}
