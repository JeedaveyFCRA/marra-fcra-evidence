<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Violation Tagger v6.2 – Fixed Cache Issue</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #left-panel {
      width: 320px;
      padding: 15px;
      background-color: #f7f9fc;
      border-right: 1px solid #ccc;
      box-sizing: border-box;
      overflow-y: auto;
    }

    #right-panel {
      flex: 2;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
      border-right: 1px solid #ccc;
    }

    #selector-panel {
      width: 320px;
      padding: 15px;
      background-color: #fefefe;
      border-left: 1px solid #ccc;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .control-panel {
      margin-bottom: 20px;
    }

    .control-panel button,
    .file-input-button {
      display: inline-block;
      margin-bottom: 8px;
      margin-right: 4px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .status-message {
      margin-bottom: 15px;
      font-style: italic;
      font-size: 12px;
      color: #666;
    }

    #sidebar-hints {
      font-size: 13px;
      margin-bottom: 15px;
    }

    #tag-log {
      font-size: 12px;
      border-top: 1px solid #ccc;
      padding-top: 10px;
    }

    #image-container {
      position: relative;
      width: 810px;
      height: 920px;
      overflow: hidden;
      border: 1px solid #ccc;
      margin: 0 auto;
    }

    #report-img {
      position: absolute;
      left: 0;
      top: 0;
      width: 810px;
      height: 920px;
      z-index: 1;
    }

    .tag-box {
      position: absolute;
      border: 2px solid red;
      border-radius: 8px;
      box-sizing: border-box;
      z-index: 2;
    }

    .tag-label {
      background: white;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      border: 1px solid #999;
      position: absolute;
      top: -20px;
      left: 0;
    }

    .selected {
      border-style: dashed;
    }

    #popup {
      margin-top: 10px;
      display: none;
      background-color: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 12px;
      width: 260px;
    }

    .file-input-button {
      background-color: #f0c040;
      border: none;
    }

    select {
      font-size: 14px;
      padding: 4px;
    }
  </style>
</head>
<body>
<!-- LEFT PANEL -->
<div id="left-panel">
  <div id="sidebar-hints">
    <strong>What to Look For</strong>
    <p>Upload image to see violations.</p>
  </div>
  <div id="tag-log"></div>
</div>

<!-- CENTER PANEL -->
<div id="right-panel">
  <div id="image-container">
    <img id="report-img" src="" alt="Uploaded image will appear here" />
  </div>

  <!-- Popup Form -->
  <div id="popup">
    <label><strong>Select Violation:</strong><br/>
      <select id="violationPreset" style="width:100%;padding:4px;"></select>
    </label><br/><br/>
    <button id="saveTag">✅ Save Tag</button>
    <button id="cancelTag">❌ Cancel</button>
  </div>
</div>

<!-- RIGHT DROPDOWN PANEL -->
<div id="selector-panel">
  <div class="control-panel">
    <label for="loadImage" class="file-input-button">📁 Load Image</label>
    <input type="file" id="loadImage" accept="image/png,image/jpeg,image/gif" style="display:none" />
    <button id="exportCSV">📤 Export CSV</button>
    <button id="toggleMultiSelect">🔘 Multi: OFF</button>
    <button id="deleteSelected">🗑️ Delete Selected</button>
    <button id="clearImageData">🧹 Clear Image Data</button>
    <button id="saveProgress">💾 Save Progress</button>
    <button id="syncToAirtable">📡 Sync to Airtable</button>
  </div>










  <h3 style="font-size:14px;">🗂️ Select Credit Report Page</h3>
  <label>Bureau:
    <select id="bureauSelect" onchange="updateCreditorOptions()" style="width:100%;">
      <option disabled selected>Select Bureau</option>
      <option value="Equifax">Equifax</option>
      <option value="Experian">Experian</option>
      <option value="TransUnion">TransUnion</option>
    </select>
  </label>
  <br><br>
  <label>Creditor:
    <select id="creditorSelect" onchange="updateDateOptions()" style="width:100%;" disabled></select>
  </label>
  <br><br>
  <label>Date + Page:
    <select id="dateSelect" style="width:100%;" disabled></select>
  </label>
  <br><br>
  <button onclick="loadSelectedImage()">📷 Load PNG</button>
</div>

<script>
  const imageMap = {
    "Equifax": {
      "AL": ["2024-04-25-P57", "2024-04-25-P58"],
      "BB": ["2024-04-25-P20"],
      "BK": ["2024-04-25-P16", "2024-04-25-P17"],
      "BY": ["2024-04-25-P34", "2024-04-25-P35"],
      "C1": ["2024-04-25-P26"],
      "C2": ["2024-04-25-P28"],
      "CR": ["2024-04-25-P18", "2024-04-25-P19"],
      "DB": ["2024-04-25-P30", "2024-04-25-P31"],
      "DL": ["2024-04-25-P50", "2024-04-25-P51"],
      "HD": ["2024-04-25-P32", "2024-04-25-P33"],
      "JP": ["2024-04-25-P24"],
      "MF": ["2024-04-25-P67"],
      "SR": ["2024-04-25-P22"]
    },
    "Experian": {
      "AL": ["2024-04-25-P05"],
      "BB": ["2024-04-25-P08", "2024-04-25-P09"],
      "BK": ["2024-04-25-P06"],
      "BY": ["2024-04-25-P07"],
      "C1": ["2024-04-25-P11"],
      "C2": ["2024-04-25-P12"],
      "CR": ["2024-04-25-P16", "2024-04-25-P17"],
      "DB": ["2024-04-25-P22"],
      "DL": ["2024-04-25-P21", "2024-04-25-P22"],
      "HD": ["2024-04-25-P34", "2024-04-25-P35"],
      "JP": ["2024-04-25-P23"],
      "MF": ["2024-04-25-P25"],
      "SR": ["2024-04-25-P31"]
    },
    "TransUnion": {
      "AL": ["2024-04-25-P07"],
      "BB": ["2024-04-25-P14"],
      "BK": ["2024-04-25-P10"],
      "BY": ["2024-04-25-P12"],
      "C1": ["2024-04-25-P17"],
      "C2": ["2024-04-25-P20"],
      "CR": ["2024-04-25-P26"],
      "DB": ["2024-04-25-P30"],
      "DL": ["2024-04-25-P27"],
      "JP": ["2024-04-25-P28"],
      "MF": ["2024-04-25-P31"],
      "SR": ["2024-04-25-P34"]
    }
  };

  function updateCreditorOptions() {
    const bureau = document.getElementById("bureauSelect").value;
    const creditorSelect = document.getElementById("creditorSelect");
    creditorSelect.innerHTML = `<option disabled selected>Select Creditor</option>`;
    if (!imageMap[bureau]) return;
    Object.keys(imageMap[bureau]).forEach(creditor => {
      const opt = document.createElement("option");
      opt.value = creditor;
      opt.textContent = creditor;
      creditorSelect.appendChild(opt);
    });
    creditorSelect.disabled = false;
    document.getElementById("dateSelect").innerHTML = '';
    document.getElementById("dateSelect").disabled = true;
  }

  function updateDateOptions() {
    const bureau = document.getElementById("bureauSelect").value;
    const creditor = document.getElementById("creditorSelect").value;
    const dateSelect = document.getElementById("dateSelect");
    dateSelect.innerHTML = `<option disabled selected>Select Date + Page</option>`;
    if (!imageMap[bureau] || !imageMap[bureau][creditor]) return;
    imageMap[bureau][creditor].forEach(entry => {
      const opt = document.createElement("option");
      opt.value = `${creditor}-${bureau.substring(0, 2).toUpperCase()}-${entry}.png`;
      opt.textContent = entry;
      dateSelect.appendChild(opt);
    });
    dateSelect.disabled = false;
  }

  function loadSelectedImage() {
    const bureau = document.getElementById("bureauSelect").value;
    const selectedFilename = document.getElementById("dateSelect").value;
    if (!bureau || !selectedFilename) {
      alert("Please select all fields.");
      return;
    }
    const imagePath = `${bureau}/${selectedFilename}`;
    imageName = selectedFilename;
    document.getElementById("report-img").src = imagePath;
    showStatusMessage(`✅ Loaded: ${imagePath}`);
  }







  // Global Variables
  let isMultiSelect = false;
  let tags = [];
  let currentBox = null;
  let imageName = "";

  // Utility Functions
  function showStatusMessage(msg) {
    document.getElementById("status-message").textContent = msg;
  }

  function createTagElement(tag, index) {
    const box = document.createElement("div");
    box.className = "tag-box";
    box.style.top = `${tag.y}px`;
    box.style.left = `${tag.x}px`;
    box.style.width = `${tag.width}px`;
    box.style.height = `${tag.height}px`;
    box.style.borderColor = getSeverityColor(tag.severity);
    box.dataset.index = index;
    box.addEventListener("click", (e) => {
      if (!isMultiSelect) {
        document.querySelectorAll(".tag-box.selected").forEach(el => el.classList.remove("selected"));
      }
      box.classList.toggle("selected");
      e.stopPropagation();
    });

    const label = document.createElement("div");
    label.className = "tag-label";
    label.textContent = tag.label;
    label.style.borderColor = getSeverityColor(tag.severity);
    box.appendChild(label);

    document.getElementById("image-container").appendChild(box);
  }

  function getSeverityColor(severity) {
    if (severity === "🔴") return "red";
    if (severity === "🟠") return "orange";
    if (severity === "🟡") return "gold";
    return "black";
  }

  function refreshTagLog() {
    const tagLog = document.getElementById("tag-log");
    tagLog.innerHTML = tags.map((tag, i) => {
      return `<div>#${i + 1} – ${tag.label} (${tag.codes.join(", ")})</div>`;
    }).join("");
  }

  // Drawing Logic
  document.getElementById("image-container").addEventListener("mousedown", function (e) {
    if (e.target.id !== "report-img") return;
    const containerRect = this.getBoundingClientRect();
    const startX = e.clientX - containerRect.left;
    const startY = e.clientY - containerRect.top;

    currentBox = {
      x: startX,
      y: startY,
      width: 0,
      height: 0
    };

    const tempBox = document.createElement("div");
    tempBox.className = "tag-box";
    tempBox.style.left = `${startX}px`;
    tempBox.style.top = `${startY}px`;
    tempBox.style.width = `0px`;
    tempBox.style.height = `0px`;
    tempBox.style.borderColor = "blue";
    tempBox.style.zIndex = "1000";
    tempBox.id = "temp-tag-box";
    this.appendChild(tempBox);

    const onMouseMove = (e2) => {
      const curX = e2.clientX - containerRect.left;
      const curY = e2.clientY - containerRect.top;
      const width = Math.abs(curX - startX);
      const height = Math.abs(curY - startY);
      tempBox.style.width = `${width}px`;
      tempBox.style.height = `${height}px`;
      tempBox.style.left = `${Math.min(curX, startX)}px`;
      tempBox.style.top = `${Math.min(curY, startY)}px`;
    };

    const onMouseUp = () => {
      document.removeEventListener("mousemove", onMouseMove);
      document.removeEventListener("mouseup", onMouseUp);
      document.getElementById("popup").style.display = "block";
    };

    document.addEventListener("mousemove", onMouseMove);
    document.addEventListener("mouseup", onMouseUp);
  });

  // Violation Preset Dropdown (from hint table)
  function populateViolationDropdown(hints) {
    const dropdown = document.getElementById("violationPreset");
    dropdown.innerHTML = "";
    hints.forEach(h => {
      const opt = document.createElement("option");
      opt.value = h.label;
      opt.textContent = `${h.label} – ${h.action}`;
      opt.dataset.codes = h.covers.join(",");
      opt.dataset.severity = h.severity;
      dropdown.appendChild(opt);
    });
  }

  document.getElementById("saveTag").addEventListener("click", () => {
    const selected = document.getElementById("violationPreset").selectedOptions[0];
    const tag = {
      label: selected.value,
      codes: selected.dataset.codes.split(","),
      severity: selected.dataset.severity,
      ...currentBox
    };
    tags.push(tag);
    document.getElementById("popup").style.display = "none";
    document.getElementById("temp-tag-box")?.remove();
    createTagElement(tag, tags.length - 1);
    refreshTagLog();
    currentBox = null;
  });

  document.getElementById("cancelTag").addEventListener("click", () => {
    document.getElementById("popup").style.display = "none";
    document.getElementById("temp-tag-box")?.remove();
    currentBox = null;
  });






  // Button Handlers
  document.getElementById("deleteSelected").addEventListener("click", () => {
    const selectedBoxes = document.querySelectorAll(".tag-box.selected");
    selectedBoxes.forEach(box => {
      const index = parseInt(box.dataset.index, 10);
      tags[index] = null;
      box.remove();
    });
    tags = tags.filter(Boolean);
    refreshTagLog();
  });

  document.getElementById("clearImageData").addEventListener("click", () => {
    document.querySelectorAll(".tag-box").forEach(el => el.remove());
    tags = [];
    refreshTagLog();
  });

  document.getElementById("toggleMultiSelect").addEventListener("click", () => {
    isMultiSelect = !isMultiSelect;
    document.getElementById("toggleMultiSelect").textContent = `🔘 Multi: ${isMultiSelect ? "ON" : "OFF"}`;
  });

  document.getElementById("exportCSV").addEventListener("click", () => {
    const csv = tags.map(tag =>
      [imageName, tag.label, tag.severity, ...tag.codes, tag.x, tag.y, tag.width, tag.height].join(",")
    ).join("\n");

    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${imageName.replace(".png", "")}_violations.csv`;
    a.click();
  });

  document.getElementById("saveProgress").addEventListener("click", () => {
    localStorage.setItem(`tags_${imageName}`, JSON.stringify(tags));
    showStatusMessage("💾 Progress saved.");
  });

  document.getElementById("loadImage").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      document.getElementById("report-img").src = reader.result;
      imageName = file.name;
      showStatusMessage(`✅ Loaded: ${file.name}`);
    };
    reader.readAsDataURL(file);
  });

  // Airtable Push Placeholder
  document.getElementById("syncToAirtable").addEventListener("click", () => {
    alert("📡 Airtable sync placeholder activated.");
  });

  // Load dropdown hints when image is loaded
  document.getElementById("report-img").addEventListener("load", () => {
    const bureauCode = imageName.includes("-EQ-") ? "EQ" :
                       imageName.includes("-EX-") ? "EX" :
                       imageName.includes("-TU-") ? "TU" : null;

    if (!bureauCode) {
      document.getElementById("sidebar-hints").innerHTML = "Image name missing bureau code (EQ, EX, TU)";
      return;
    }

    const hints = hintLookup[bureauCode];
    populateViolationDropdown(hints);
    document.getElementById("sidebar-hints").innerHTML = `<strong>What to Look For:</strong><ul>` + hints.map(h => `<li>${h.label} – ${h.action}</li>`).join("") + "</ul>";
  });

  const hintLookup = {
    EQ: [
      {
        label: "Account Status: INCLUDED_IN_CHAPTER_13",
        covers: ["§1681c(f)", "§1681e(b)"],
        action: "Account misreported as active in Chapter 13 after discharge",
        severity: "🔴"
      },
      {
        label: "Balance: $0",
        covers: ["§1681e(b)", "§1681c(f)"],
        action: "Blank or false balance after discharge",
        severity: "🔴"
      }
    ],
    EX: [
      {
        label: "Status: Discharged through Bankruptcy Chapter 13",
        covers: ["§1681s-2(a)(1)(A)", "§1681c(a)(4)", "§1681e(b)"],
        action: "Status fails to reflect discharge update",
        severity: "🔴"
      }
    ],
    TU: [
      {
        label: "Pay Status: Account Included in Bankruptcy",
        covers: ["§1681c(f)", "§1681e(b)"],
        action: "Misleading status post-discharge",
        severity: "🔴"
      }
    ]
  };
</script>
</body>
</html>
